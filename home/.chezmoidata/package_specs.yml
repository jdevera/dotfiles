# yaml-language-server: $schema=./.package_specs.schema.yml
---
# Software package specs, heavily inspired by InstallDoctor:
# https://install.doctor/docs/customization/software
#
# This file is not meant to be a list of what gets installed, but rather
# how to install the packages that are requested elsewhere.
softwarePackages:
  tox:
    uv:
      name: tox
      with: tox-uv
  claude-code:
    script: >-
      curl -fsSL https://claude.ai/install.sh | bash
  colout:
    uv: colout
  bash:
    brew: bash
    apt: bash
    dnf: bash
  bash-completion:
    brew: bash-completion@2
    apt: bash-completion
    dnf: bash-completion
  bat:
    brew: bat
    apt: bat
    dnf: bat
  curl:
    brew: curl
    apt: curl
    dnf: curl
  fd:
    brew: fd
    apt: fd-find
    dnf: fd-find
  fzf:
    brew: fzf
    apt: fzf
    dnf: fzf
  git:
    brew: git
    apt: git
    dnf: git
  git-delta:
    brew: git-delta
    apt: git-delta
    dnf: git-delta
  jq:
    brew: jq
    apt: jq
    dnf: jq
  ripgrep:
    brew: ripgrep
    apt: ripgrep
    dnf: ripgrep
  rsync:
    brew: rsync
    apt: rsync
    dnf: rsync
  starship:
    brew: starship
    apt: starship
    dnf:
      package: starship
      copr: atim/starship
  tig:
    brew: tig
    apt: tig
    dnf: tig
  tmux:
    brew: tmux
    apt: tmux
    dnf: tmux
  tree:
    brew: tree
    apt: tree
    dnf: tree
  uv:
    brew: uv
    apt: uv
    dnf: uv
    script: >-
      sh -c "$(curl -LsSf https://astral.sh/uv/install.sh )" --no-modify-path
  wget:
    brew: wget
    apt: wget
    dnf: wget
  macvim:
    cask: macvim-app
  vim:
    apt: vim
    dnf: vim-enhanced
  jordanbaird-ice:
    cask: jordanbaird-ice
  nf-fantasque-sans-mono:
    cask: font-fantasque-sans-mono-nerd-font
  yq:
    homepage: https://github.com/mikefarah/yq
    brew: yq
    eget:
      source: mikefarah/yq
  hishtory:
    homepage: https://github.com/ddworken/hishtory
    brew: hishtory
    eget:
      source: ddworken/hishtory
  vscode:
    cask: visual-studio-code
  zoxide:
    brew: zoxide
    dnf: zoxide
    eget:
      source: ajeetdsouza/zoxide
  lowdown:
    brew: lowdown
    apt: lowdown
    dnf: lowdown
  eget:
    brew: eget
    script: >-
      curl -o /tmp/eget.sh https://zyedidia.github.io/eget.sh && cd /tmp && sh /tmp/eget.sh && mv /tmp/eget ~/.local/bin/
  git-this-bread:
    brew: jdevera/tap/git-this-bread
    dnf:
      package: git-this-bread
      copr: jdevera/git-this-bread
  shdoc-ng:
    brew: jdevera/tap/shdoc-ng
    dnf:
      package: shdoc-ng
      copr: jdevera/shdoc-ng
    eget:
      source: jdevera/shdoc-ng
