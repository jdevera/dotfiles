vscode_extensions:
  - id: catppuccin.catppuccin-vsc
    name: "Catppuccin for VSCode"
    description: "Soothing pastel theme for VSCode"
  - id: github.copilot-chat
    name: "GitHub Copilot Chat"
    description: "AI chat features powered by Copilot"
  - id: vscodevim.vim
    name: "Vim"
    description: "Vim emulation for Visual Studio Code"
  - id: ms-python.python
    name: "Python"
    description: "Python language support with IntelliSense, debugging, linting, formatting, and more"
  - id: ms-python.debugpy
    name: "Python Debugger"
    description: "Python Debugger extension using debugpy"
  - id: ms-python.vscode-pylance
    name: "Pylance"
    description: "A performant, feature-rich language server for Python in VS Code"
  - id: ms-python.vscode-python-envs
    name: "Python Environments"
    description: "Provides a unified python environment experience"
  - id: mads-hartmann.bash-ide-vscode
    name: "Bash IDE"
    description: "A language server for Bash"
  - id: bierner.markdown-mermaid
    name: "Markdown Preview Mermaid Support"
    description: "Adds Mermaid diagram and flowchart support to VS Code's builtin markdown preview"
  - id: redhat.vscode-yaml
    name: "YAML"
    description: "YAML Language Support by Red Hat, with built-in Kubernetes syntax support"
  - id: jinliming2.vscode-go-template
    name: "Go Template Support"
    description: "Syntax highlight support for Go text/template and html/template"
  - id: samuelcolvin.jinjahtml
    name: "Better Jinja"
    description: "Syntax highlighting for jinja(2) including HTML, Markdown, YAML, Ruby and LaTeX templates"
  - id: usernamehw.todo-md
    name: "Todo MD"
    description: "Todo tracking based on todo.txt format"
  - id: ms-azuretools.vscode-containers
    name: "Container Tools"
    description: "Create, manage, and debug containerized applications"
  - id: ms-vscode-remote.remote-containers
    name: "Dev Containers"
    description: "Open any folder or repository inside a Docker container"
  - id: charliermarsh.ruff
    name: "Ruff"
    description: "Python linter and formatter"
  - id: redhat.ansible
    name: "Ansible"
    description: "Ansible language support"
  - id: golang.go
    name: "Go"
    description: "Rich Go language support for Visual Studio Code"
  - id: github.vscode-github-actions
    name: "GitHub Actions"
    description: "GitHub Actions workflows and runs for github.com hosted repositories"
  - id: tamasfe.even-better-toml
    name: "Even Better TOML"
    description: "Fully-featured TOML support"
